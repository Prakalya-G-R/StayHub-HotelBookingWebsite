<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cssfiles/hotels.css">
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Protest+Riot&display=swap" rel="stylesheet">
    <title>Hotels Page</title>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-hotel-icon lucide-hotel"><path d="M10 22v-6.57"/><path d="M12 11h.01"/><path d="M12 7h.01"/><path d="M14 15.43V22"/><path d="M15 16a5 5 0 0 0-6 0"/><path d="M16 11h.01"/><path d="M16 7h.01"/><path d="M8 11h.01"/><path d="M8 7h.01"/><rect x="4" y="2" width="16" height="20" rx="2"/></svg>
                StayHub
            </div>
        </div>
        <div class="nav-toggle">
            <div class="hamburger">
                <svg id="hambar" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-menu-icon lucide-menu"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/></svg>
            </div>
        </div>
        <ul class="nav-menu">
            <div class="menu-close">
                <svg id="close" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </div>
            <li class="menu-item"><a href="index.html#home">Home</a></li>
            <li class="menu-item"><a href="hotels.html" class="active">Hotels</a></li>
            <li class="menu-item"><a href="index.html#destinations">Destinations</a></li>
            <li class="menu-item" id="bookings-link" style="display: none;">
        <a href="#">My Bookings</a>
    </li>
            <li class="menu-item"><a href="index.html#about">About</a></li>
            <li id="loginbtn" class="menu-item"><a href="#">Login</a></li>
        </ul>

        <a href="#" class="loginout">Login</a>
    </nav>
        <div class="container">
    <main class="hotels-page">
        <aside class="filters-container">
            <section class="filters-card">
                <div class="search-container">
                    <div class="search-div">
                        <p class="search-head">Search Hotels</p>
                        <div class="close-menu">
                            <svg id="closemenu" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                        </div>
                    </div>
                    <form class="searchcontent">
                        <div class="searchfield dest-field">
                            <label><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-map-pin-icon lucide-map-pin"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
                            Destination</label>
                            <input id="destsearch" type="text" placeholder="e.g. Goa" autocomplete="off" required>
                            <div id="suggestions"></div>
                        </div>
                        <div class="searchfield checkinfield">
                            <label><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar-arrow-up-icon lucide-calendar-arrow-up"><path d="m14 18 4-4 4 4"/><path d="M16 2v4"/><path d="M18 22v-8"/><path d="M21 11.343V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9"/><path d="M3 10h18"/><path d="M8 2v4"/></svg>
                            Check In</label>
                            <input id="checkin" type="date" required oninvalid="this.setCustomValidity('Please select a check-in date')"
    oninput="this.setCustomValidity('')">
                        </div>
                        <div class="searchfield checkoutfield">
                            <label><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar-arrow-down-icon lucide-calendar-arrow-down"><path d="m14 18 4 4 4-4"/><path d="M16 2v4"/><path d="M18 14v8"/><path d="M21 11.354V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h7.343"/><path d="M3 10h18"/><path d="M8 2v4"/></svg>
                            Check Out</label>
                            <input id="checkout" type="date" required oninvalid="this.setCustomValidity('Please select a check-out date')"
    oninput="this.setCustomValidity('')">
                        </div>
                        <div class="searchfield">
                            <label><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-users-icon lucide-users"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><path d="M16 3.128a4 4 0 0 1 0 7.744"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="9" cy="7" r="4"/></svg>
                            Guests</label>
                            <input type="number" id="guests" min="1" placeholder="e.g. 2" required oninvalid="this.setCustomValidity('Please mention the no. of guests')"
    oninput="this.setCustomValidity('')">
                        </div>
                        <div class="searchfield">
                            <label><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-bed-single-icon lucide-bed-single"><path d="M3 20v-8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v8"/><path d="M5 10V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v4"/><path d="M3 18h18"/></svg>
                            Rooms</label>
                            <input type="number" id="rooms" min="1" placeholder="e.g. 1" required oninvalid="this.setCustomValidity('Please mention the no. of rooms')"
    oninput="this.setCustomValidity('')">
                        </div>
                        <button src="#" type="submit" id="searchroomsbtn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search-icon lucide-search"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
                            Search
                        </button>
                    </form>
                </div>
                <div class="filter-content">
                    <p class="filter-head">Filters</p>
                    <div class="ratings-container">
                        <div class="rating-div">
                            <p class="ratinghead">Ratings</p>
                        </div>
                        <div class="ratings-content">
                            <label class="ratings-option">
                                <input type="radio" name="rating" value="0" checked>
                                <span class="ratingspan">Any rating</span>
                            </label>
                            <label class="ratings-option">
                                <input type="radio" name="rating" value="4.5">
                                <span class="ratingspan"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-star-icon lucide-star"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg>
                                4.5+ Exceptional</span>
                            </label>
                            <label class="ratings-option">
                                <input type="radio" name="rating" value="4">
                                <span class="ratingspan"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-star-icon lucide-star"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg>
                                4.0+ Excellent</span>
                            </label>
                            <label class="ratings-option">
                                <input type="radio" name="rating" value="3.5">
                                <span class="ratingspan"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-star-icon lucide-star"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg>
                                3.5+ very Good</span>
                            </label>
                            <label class="ratings-option">
                                <input type="radio" name="rating" value="3">
                                <span class="ratingspan"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-star-icon lucide-star"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg>
                                3+  Good</span>
                            </label>
                        </div>
                    </div>
                    <div class="price-container">
                        <div class="price-div">
                            <p class="pricehead">Price Range per Night</p>
                        </div>
                        <div class="price-content">
                            <input id="priceRange" type="range" min="1000" max="25000" step="500" value="1000">
                            <div class="pricevalue">
                                <p>Up to <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-indian-rupee-icon lucide-indian-rupee"><path d="M6 3h12"/><path d="M6 8h12"/><path d="m6 13 8.5 8"/><path d="M6 13h3"/><path d="M9 13c6.667 0 6.667-10 0-10"/></svg>
                                <span id="priceValue">25000</span></p>
                            </div>
                        </div>
                    </div>
                    <div class="property-container">
                        <div class="property-div">
                            <p class="propertyhead">Property Type</p>
                        </div>
                        <div class="property-content">
                            <label>
                                <input type="checkbox" value="Hotel" checked>Hotel
                            </label>
                            <label>
                                <input type="checkbox" value="Resort" checked>Resort
                            </label>
                            <!--<label>
                                <input type="checkbox" value="Villa" checked>Villa
                            </label>
                            <label>
                                <input type="checkbox" value="Homestay" checked>Homestay
                            </label>-->
                        </div>
                    </div>
                    <div class="amenities-containter">
                        <div class="amenities-div">
                            <p class="amenitieshead">Amenities</p>
                        </div>
                        <div class="amenities-content">
                            <label><input type="checkbox" value="wifi"> <span>Free WiFi</span></label>
                            <label><input type="checkbox" value="pool"> <span>Swimming Pool</span></label>
                            <label><input type="checkbox" value="parking"> <span>Parking</span></label>
                            <label><input type="checkbox" value="restaurant"> <span>Restaurant</span></label>
                            <label><input type="checkbox" value="gym"> <span>Gym</span></label>
                            <label><input type="checkbox" value="spa"> <span>Spa</span></label>
                        </div>
                    </div>
                    <div class="apply-reset">
                        <div id="reset">
                            <p>Reset</p>
                        </div>
                        <div id="apply">
                            <p>Apply</p>
                        </div>
                    </div>
                </div>
            </section>
        </aside>
        <section class="hotel-container">
            <div class="hotel-head">
                <h2 class="hotelheading">All Hotels</h2>
                <div class="hotelactionicons">
                    <div class="filter-toggle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-funnel-icon lucide-funnel"><path d="M10 20a1 1 0 0 0 .553.895l2 1A1 1 0 0 0 14 21v-7a2 2 0 0 1 .517-1.341L21.74 4.67A1 1 0 0 0 21 3H3a1 1 0 0 0-.742 1.67l7.225 7.989A2 2 0 0 1 10 14z"/></svg>
                    </div>
                    <div id="sorticon">
                        <svg id="sortbtn" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-up-down-icon lucide-arrow-up-down"><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></svg>
                        <div id="sort-container">
                        <p class="sort-head">Sort By</p>
                        <div class="sort-content">
                            <label id="sort"><input type=radio name="sort" value="Recommended" checked>Recommended</label>
                            <label id="sort"><input type=radio name="sort" value="priceLowToHigh">Price (Low to High)</label>
                            <label id="sort"><input type=radio name="sort" value="priceHighToLow">Price (High to Low)</label>
                            <label id="sort"><input type=radio name="sort" value="guestRatings">Guest Ratings</label>
                        </div>
                    </div>
                    </div>
                    </div>
                </div>
            <div class="hotel-content">
                
            </div>
        </section>
    </main>


    <script src="jsfiles/hotels.js"></script>
    </div>
</body>
</html>
